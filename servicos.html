<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Elegance - Serviços</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <a href="index.html"><img src="/imgs/logo.png" alt="Studio Elegance"></a>
  </div>

  <div class="user">
    <span id="userName">Visitante</span>
    <button class="btn" id="authBtn">Entrar</button>
  </div>
</div>

<!-- WELCOME -->
<div class="welcome">
  <h1>Serviços</h1>
  <p>Descubra nossos serviços exclusivos para você.</p>
</div>

<!-- LISTA DE SERVIÇOS -->
<div class="section-title">Serviços Disponíveis</div>
<div class="experiences">

  <div class="exp-card">
    <img src="https://images.unsplash.com/photo-1700760934268-8aa0ef52ce0a?q=80&w=764&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Corte Premium">
    <div class="exp-content">
      <h3>Corte Premium</h3>
      <p>Estilo personalizado com acabamento impecável.</p>
      <div class="exp-info">Beleza</div>
    </div>
  </div>

  <div class="exp-card">
    <img src="https://images.unsplash.com/photo-1529982412356-901cc3a363cf?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Manicure & Pedicure">
    <div class="exp-content">
      <h3>Manicure & Pedicure</h3>
      <p>Cuidado completo para mãos e pés.</p>
      <div class="exp-info">Relax</div>
    </div>
  </div>

  <div class="exp-card">
    <img src="https://plus.unsplash.com/premium_photo-1681966525283-71fdeec585b1?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Massagem Relaxante">
    <div class="exp-content">
      <h3>Massagem Relaxante</h3>
      <p>Alívio de tensões e bem-estar garantido.</p>
      <div class="exp-info">Spa</div>
    </div>
  </div>

</div>


</div>

<script src="script.js"></script>
</body>
</html>
