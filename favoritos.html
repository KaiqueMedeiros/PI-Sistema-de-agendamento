<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Elegance - Favoritos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <a href="index.html"><img src="/imgs/logo.png" alt="Studio Elegance"></a>
  </div>

  <div class="user">
    <span id="userName">Visitante</span>
    <button class="btn" id="authBtn">Entrar</button>
  </div>
</div>

<!-- WELCOME -->
<div class="welcome">
  <h1>Favoritos</h1>
  <p>Seus serviços preferidos ficam salvos aqui.</p>
</div>

<!-- LISTA DE FAVORITOS -->
<div class="section-title">Meus Favoritos</div>
<div class="experiences">

  <!-- Caso não tenha favoritos -->
  <div class="exp-card">
    <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Favoritos">
    <div class="exp-content">
      <h3>Nenhum favorito ainda</h3>
      <p>Adicione serviços à sua lista de favoritos para acessá-los rapidamente.</p>
    </div>
  </div>

  <!-- Exemplo de favorito salvo -->
  <!-- Você pode duplicar este bloco para cada serviço marcado como favorito -->
  <!--
  <div class="exp-card">
    <img src="URL_DA_IMAGEM_DO_SERVIÇO" alt="Serviço Favorito">
    <div class="exp-content">
      <h3>Nome do Serviço</h3>
      <p>Descrição breve do serviço.</p>
      <div class="exp-info">Categoria</div>
    </div>
  </div>
  -->

</div>

</div>

<script src="script.js"></script>
</body>
</html>
